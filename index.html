<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Lecture"/>
  <title>Lecture</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#f8f7f4;--surface:#fff;--border:#e8e5e0;--border-strong:#c8c4bc;
      --text:#1a1916;--text-2:#6b6760;--text-3:#a09d98;
      --accent-soft:#f0ede8;--tag-done:#5a7a5a;--radius:12px;--radius-sm:8px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
    #app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

    /* TOPBAR */
    .topbar{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
    .topbar-title{font-family:'DM Serif Display',serif;font-size:1.25rem;letter-spacing:-.01em}
    .topbar-back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:.875rem;cursor:pointer;padding:4px 0}
    .topbar-back svg{width:16px;height:16px}
    .topbar-action{background:none;border:1px solid var(--border-strong);color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:.8rem;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
    .topbar-action:hover{background:var(--accent-soft);color:var(--text);border-color:var(--text)}

    /* TABS */
    .tabbar{display:flex;padding:0 20px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
    .tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text-3);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;padding:10px 14px 8px;cursor:pointer;position:relative;top:1px;transition:color .15s,border-color .15s}
    .tab-btn.active{color:var(--text);border-bottom-color:var(--text)}

    /* SCROLL */
    .scroll-area{flex:1;overflow-y:auto;padding:20px;scrollbar-width:none}
    .scroll-area::-webkit-scrollbar{display:none}

    /* BOOK LIST */
    .books-list{display:flex;flex-direction:column;gap:10px}
    .book-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .15s,box-shadow .15s;animation:fadeUp .3s ease both}
    .book-row:hover{border-color:var(--border-strong);box-shadow:0 2px 12px rgba(0,0,0,.06)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .book-color-tab{width:4px;height:48px;border-radius:2px;flex-shrink:0}
    .book-row-info{flex:1;min-width:0}
    .book-row-title{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .book-row-author{font-size:.82rem;color:var(--text-2);margin-top:2px;font-style:italic}
    .book-row-progress{margin-top:8px;display:flex;align-items:center;gap:8px}
    .progress-track{flex:1;height:2px;background:var(--border);border-radius:1px}
    .progress-fill{height:100%;border-radius:1px;background:var(--text);transition:width .4s ease}
    .progress-pct{font-size:.72rem;color:var(--text-3);flex-shrink:0}
    .status-tag{font-size:.7rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:20px;flex-shrink:0}
    .status-en-cours{background:var(--text);color:#fff}
    .status-termine{background:#e8f0e8;color:var(--tag-done)}
    .status-a-lire{background:var(--accent-soft);color:var(--text-3)}

    /* SOURCE BADGE */
    .source-badge{font-size:.65rem;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:10px;flex-shrink:0;margin-left:4px}
    .source-github{background:#e8f0e8;color:#2a6a2a}
    .source-local{background:var(--accent-soft);color:var(--text-3)}

    /* ADD / SYNC */
    .add-row{background:none;border:1px dashed var(--border-strong);border-radius:var(--radius);padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text-3);font-family:'DM Sans',sans-serif;font-size:.875rem;transition:all .15s;width:100%;margin-top:4px}
    .add-row:hover{border-color:var(--text);color:var(--text);background:var(--accent-soft)}

    /* SYNC BAR */
    .sync-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 14px;font-size:.78rem;color:var(--text-3)}
    .sync-btn{background:none;border:none;color:var(--text-2);font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:background .15s}
    .sync-btn:hover{background:var(--accent-soft);color:var(--text)}
    .sync-btn svg{width:13px;height:13px}
    .sync-spinning svg{animation:spin 1s linear infinite}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    /* EMPTY */
    .empty{text-align:center;padding:60px 20px;color:var(--text-3)}
    .empty p{font-size:.9rem;line-height:1.7;font-style:italic}

    /* SETUP BANNER */
    .setup-banner{background:#fff8e8;border:1px solid #e8d080;border-radius:var(--radius);padding:16px;margin-bottom:16px}
    .setup-banner h4{font-size:.875rem;font-weight:500;color:#6a5010;margin-bottom:6px}
    .setup-banner p{font-size:.8rem;color:#8a6820;line-height:1.55}
    .setup-banner input{width:100%;margin-top:8px;border:1px solid #d8c060;border-radius:6px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:.85rem;background:#fffdf5;outline:none}
    .setup-banner input:focus{border-color:#b8900a}
    .setup-save{margin-top:8px;background:#1a1916;color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:.8rem;cursor:pointer;font-family:'DM Sans',sans-serif}

    /* DETAIL */
    .detail-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
    .detail-hero-title{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text);line-height:1.25;margin-bottom:4px}
    .detail-hero-author{font-size:.875rem;color:var(--text-2);font-style:italic;margin-bottom:16px}
    .detail-progress-row{display:flex;align-items:center;gap:10px}
    .detail-progress-track{flex:1;height:3px;background:var(--border);border-radius:2px}
    .detail-progress-fill{height:100%;background:var(--text);border-radius:2px;transition:width .5s ease}
    .detail-progress-label{font-size:.78rem;color:var(--text-3);white-space:nowrap}

    /* SECTION BLOCKS */
    .section-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
    .section-block-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
    .section-block-header:hover{background:var(--accent-soft)}
    .section-block-label{display:flex;align-items:center;gap:10px}
    .section-icon{width:28px;height:28px;border-radius:7px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
    .section-block-title{font-family:'DM Serif Display',serif;font-size:.95rem;color:var(--text)}
    .section-block-subtitle{font-size:.78rem;color:var(--text-3);margin-top:1px}
    .section-chevron{color:var(--text-3);font-size:.75rem;transition:transform .2s}
    .section-chevron.open{transform:rotate(90deg)}
    .section-block-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
    .section-block-body.open{display:block}

    /* CHAPTER ROWS */
    .chapter-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
    .chapter-row:last-child{border-bottom:none}
    .chapter-row.read{opacity:.45}
    .chapter-row:hover{opacity:1}
    .ch-num{font-size:.72rem;color:var(--text-3);min-width:28px;text-align:right;flex-shrink:0}
    .ch-title{flex:1;font-size:.9rem;color:var(--text);line-height:1.3}
    .ch-current{width:6px;height:6px;border-radius:50%;background:var(--text);flex-shrink:0}
    .ch-check{font-size:.8rem;color:var(--tag-done);flex-shrink:0}

    /* CHAR CARDS */
    .char-card{padding:14px 0;border-bottom:1px solid var(--border)}
    .char-card:last-child{border-bottom:none}
    .char-name{font-family:'DM Serif Display',serif;font-size:.95rem;color:var(--text);margin-bottom:2px}
    .char-meta{font-size:.78rem;color:var(--text-3);margin-bottom:6px;font-style:italic}
    .char-tag{font-size:.68rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:var(--accent-soft);color:var(--text-2)}
    .char-desc{font-size:.85rem;color:var(--text-2);line-height:1.55;margin-top:6px}

    /* READER */
    .reader-body{padding-bottom:40px}
    .reader-section-title{font-size:.7rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);padding:18px 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px}
    .reader-section-title:first-child{padding-top:0}
    .reader-para{font-size:1rem;line-height:1.78;color:var(--text);margin-bottom:14px}
    .reader-quote{border-left:2px solid var(--text);padding:10px 16px;margin:18px 0;background:var(--accent-soft);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
    .reader-quote p{font-family:'DM Serif Display',serif;font-style:italic;font-size:1rem;color:var(--text);line-height:1.55}
    .reader-reflection{background:var(--accent-soft);border-radius:var(--radius-sm);padding:12px 14px;margin-top:18px}
    .reader-reflection p{font-size:.875rem;color:var(--text-2);line-height:1.6;font-style:italic}

    /* READER NAV */
    .reader-nav{display:flex;align-items:center;gap:8px;padding:10px 20px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
    .nav-btn{background:none;border:1px solid var(--border);color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:8px 14px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .nav-btn:hover{border-color:var(--text);color:var(--text)}
    .nav-btn:disabled{opacity:.3;cursor:default}
    .nav-btn:disabled:hover{border-color:var(--border);color:var(--text-2)}
    .nav-btn.primary{flex:1;background:var(--text);color:#fff;border-color:var(--text);text-align:center}
    .nav-btn.primary:hover{background:#333}
    .nav-btn.primary.done{background:var(--tag-done);border-color:var(--tag-done)}

    /* MODALS */
    .overlay{display:none;position:fixed;inset:0;background:rgba(26,25,22,.5);z-index:200;align-items:flex-end}
    .overlay.open{display:flex}
    .sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:90vh;overflow-y:auto;animation:sheetUp .25s ease}
    @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sheet h3{font-family:'DM Serif Display',serif;font-size:1.15rem;margin-bottom:20px;color:var(--text)}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px}
    .field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--text)}
    .field textarea{resize:vertical;min-height:100px;line-height:1.5}
    .sheet-actions{display:flex;gap:8px;margin-top:18px}
    .btn-cancel{padding:11px 20px;border:1px solid var(--border);background:none;border-radius:20px;color:var(--text-2);font-family:'DM Sans',sans-serif;font-size:.875rem;cursor:pointer}
    .btn-save{flex:1;padding:11px;background:var(--text);color:#fff;border:none;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer}
    .btn-save:hover{background:#333}

    .block-edit-btn{background:none;border:none;color:var(--text-3);font-size:.78rem;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .15s}
    .block-edit-btn:hover{color:var(--text)}

    /* COLORS */
    .colors{--c0:#2d3561;--c1:#1e5245;--c2:#7a2038;--c3:#5a3e1b;--c4:#1a3a5c;--c5:#4a4a4a}
    #app{--c0:#2d3561;--c1:#1e5245;--c2:#7a2038;--c3:#5a3e1b;--c4:#1a3a5c;--c5:#4a4a4a}
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="v-home" style="display:flex;flex-direction:column;height:100vh">
    <div class="topbar">
      <span class="topbar-title">Lecture</span>
      <button class="topbar-action sync-btn" id="sync-btn" onclick="syncGitHub()" title="Synchroniser depuis GitHub">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M14 8A6 6 0 1 1 8 2M8 2l3 3M8 2L5 5"/>
        </svg>
        Sync
      </button>
    </div>
    <div class="tabbar">
      <button class="tab-btn active" onclick="setTab('en-cours')">En cours</button>
      <button class="tab-btn" onclick="setTab('termine')">Terminés</button>
      <button class="tab-btn" onclick="setTab('all')">Tous</button>
    </div>
    <div class="scroll-area" id="home-list"></div>
  </div>

  <!-- DETAIL -->
  <div id="v-detail" style="display:none;flex-direction:column;height:100vh">
    <div class="topbar">
      <button class="topbar-back" onclick="goHome()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3L5 8l5 5"/></svg>
        Bibliothèque
      </button>
      <button class="topbar-action" id="detail-add-btn" onclick="openAddChapter()">+ Chapitre</button>
    </div>
    <div class="scroll-area" id="detail-body"></div>
  </div>

  <!-- READER -->
  <div id="v-reader" style="display:none;flex-direction:column;height:100vh">
    <div class="topbar">
      <button class="topbar-back" onclick="goDetail()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3L5 8l5 5"/></svg>
        <span id="reader-back-label">Retour</span>
      </button>
    </div>
    <div class="scroll-area reader-body" id="reader-body"></div>
    <div class="reader-nav">
      <button class="nav-btn" id="btn-prev" onclick="navChapter(-1)">←</button>
      <button class="nav-btn primary" id="btn-mark" onclick="toggleRead()">Marquer lu</button>
      <button class="nav-btn" id="btn-next" onclick="navChapter(1)">→</button>
    </div>
  </div>

</div>

<!-- MODAL: GITHUB CONFIG -->
<div class="overlay" id="m-config" onclick="closeIfOverlay(event,'m-config')">
  <div class="sheet">
    <h3>Configuration GitHub</h3>
    <p style="font-size:.85rem;color:var(--text-2);line-height:1.6;margin-bottom:16px">
      Renseigne ton dépôt GitHub pour que l'app charge automatiquement les fichiers JSON de chaque livre.
    </p>
    <div class="field">
      <label>Nom d'utilisateur GitHub</label>
      <input id="cfg-user" placeholder="ex. johndoe"/>
    </div>
    <div class="field">
      <label>Nom du dépôt</label>
      <input id="cfg-repo" placeholder="ex. bibliotheque"/>
    </div>
    <div class="field">
      <label>Dossier des livres (optionnel)</label>
      <input id="cfg-folder" placeholder="ex. livres  (laisser vide si à la racine)"/>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeModal('m-config')">Annuler</button>
      <button class="btn-save" onclick="saveConfig()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD BOOK (manuel) -->
<div class="overlay" id="m-book" onclick="closeIfOverlay(event,'m-book')">
  <div class="sheet">
    <h3>Ajouter manuellement</h3>
    <div class="field"><label>Titre</label><input id="f-title" placeholder="ex. La Voie de l'Ennemi"/></div>
    <div class="field"><label>Auteur</label><input id="f-author" placeholder="ex. Tony Hillerman"/></div>
    <div class="field"><label>Année</label><input id="f-year" type="number" placeholder="ex. 1970"/></div>
    <div class="field"><label>Nombre de chapitres</label><input id="f-total" type="number" placeholder="ex. 18"/></div>
    <div class="field">
      <label>Statut</label>
      <select id="f-status">
        <option value="en-cours">En cours</option>
        <option value="termine">Terminé</option>
        <option value="a-lire">À lire</option>
      </select>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeModal('m-book')">Annuler</button>
      <button class="btn-save" onclick="saveBook()">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD CHAPTER -->
<div class="overlay" id="m-chapter" onclick="closeIfOverlay(event,'m-chapter')">
  <div class="sheet">
    <h3>Nouveau chapitre</h3>
    <div class="field"><label>Numéro</label><input id="c-num" type="number" placeholder="ex. 5"/></div>
    <div class="field"><label>Titre (optionnel)</label><input id="c-title" placeholder="ex. La cérémonie du Chant"/></div>
    <div class="field"><label>Guide (résumé Claude)</label><textarea id="c-content" placeholder="Colle ici le guide généré..."></textarea></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeModal('m-chapter')">Annuler</button>
      <button class="btn-save" onclick="saveChapter()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL: EDIT HEADER -->
<div class="overlay" id="m-header" onclick="closeIfOverlay(event,'m-header')">
  <div class="sheet">
    <h3>En-tête du livre</h3>
    <div class="field"><label>Contenu</label><textarea id="h-content" placeholder="Colle l'en-tête généré par Claude..." style="min-height:140px"></textarea></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeModal('m-header')">Annuler</button>
      <button class="btn-save" onclick="saveHeader()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD CHARACTER -->
<div class="overlay" id="m-char" onclick="closeIfOverlay(event,'m-char')">
  <div class="sheet">
    <h3>Fiche personnage</h3>
    <div class="field"><label>Nom</label><input id="ch-name" placeholder="ex. Joe Leaphorn"/></div>
    <div class="field"><label>Statut narratif</label>
      <select id="ch-role">
        <option value="Principal">Principal</option>
        <option value="Secondaire">Secondaire</option>
        <option value="Tertiaire">Tertiaire</option>
      </select>
    </div>
    <div class="field"><label>Profession / âge / classe</label><input id="ch-meta" placeholder="ex. Lieutenant de police, 40 ans"/></div>
    <div class="field"><label>Traits marquants</label><textarea id="ch-desc" placeholder="Caractère, physique, liens..." style="min-height:80px"></textarea></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeModal('m-char')">Annuler</button>
      <button class="btn-save" onclick="saveChar()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
// Remplis ici ou via le bouton "Sync" dans l'app
const DEFAULT_CONFIG = {
  user: '',   // ton nom d'utilisateur GitHub
  repo: '',   // nom du dépôt (ex: "bibliotheque")
  folder: ''  // dossier des JSON (ex: "livres"), vide = racine
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S = { books:[], tab:'en-cours', bookId:null, chIdx:null, config: DEFAULT_CONFIG, lastSync: null };

function persist(){ try{ localStorage.setItem('lect_v3', JSON.stringify(S)); }catch(e){} }
function hydrate(){
  try{
    const r = localStorage.getItem('lect_v3');
    if(r){ const saved=JSON.parse(r); S={...S,...saved}; }
  }catch(e){}
}

// ══════════════════════════════════════════
// GITHUB SYNC
// ══════════════════════════════════════════
async function syncGitHub(){
  const {user, repo, folder} = S.config;

  if(!user || !repo){
    // Ouvre la config si pas encore renseignée
    document.getElementById('cfg-user').value = user||'';
    document.getElementById('cfg-repo').value = repo||'';
    document.getElementById('cfg-folder').value = folder||'';
    openModal('m-config');
    return;
  }

  const btn = document.getElementById('sync-btn');
  btn.classList.add('sync-spinning');
  btn.style.pointerEvents='none';

  try {
    // 1. Lire le contenu du dossier via l'API GitHub
    const base = folder
      ? `https://api.github.com/repos/${user}/${repo}/contents/${folder}`
      : `https://api.github.com/repos/${user}/${repo}/contents`;

    const res = await fetch(base, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });

    if(!res.ok) throw new Error(`GitHub API: ${res.status}`);
    const files = await res.json();

    // 2. Filtrer les .json (hors manifest.json)
    const jsonFiles = files.filter(f =>
      f.name.endsWith('.json') && f.name !== 'manifest.json'
    );

    if(jsonFiles.length === 0){
      showToast('Aucun fichier JSON trouvé dans le dépôt.');
      return;
    }

    // 3. Télécharger chaque JSON
    let added=0, updated=0;
    for(const file of jsonFiles){
      try{
        const r2 = await fetch(file.download_url);
        if(!r2.ok) continue;
        const book = await r2.json();
        if(!book.id || !book.title) continue;

        // Conserver la progression locale (chapitres lus)
        const existing = S.books.find(b => b.id === book.id);
        if(existing){
          // Fusionner : garder le statut "read" local, mettre à jour le contenu
          const localReadMap = {};
          (existing.chapters||[]).forEach(c=>{ localReadMap[c.num]=c.read; });
          book.chapters = (book.chapters||[]).map(c=>({
            ...c,
            read: localReadMap[c.num] !== undefined ? localReadMap[c.num] : c.read||false
          }));
          book.status = existing.status; // garder statut local
          const idx = S.books.findIndex(b=>b.id===book.id);
          S.books[idx] = { ...book, source:'github' };
          updated++;
        } else {
          book.chapters = (book.chapters||[]).map(c=>({...c, read:c.read||false}));
          S.books.push({ ...book, source:'github' });
          added++;
        }
      }catch(e){ console.warn('Erreur fichier:', file.name, e); }
    }

    S.lastSync = new Date().toISOString();
    persist();
    renderHome();
    showToast(`Sync OK — ${added} ajouté${added>1?'s':''}, ${updated} mis à jour`);

  } catch(err){
    console.error(err);
    showToast('Erreur de synchronisation. Vérifie la config GitHub.');
  } finally {
    btn.classList.remove('sync-spinning');
    btn.style.pointerEvents='';
  }
}

function saveConfig(){
  S.config.user   = document.getElementById('cfg-user').value.trim();
  S.config.repo   = document.getElementById('cfg-repo').value.trim();
  S.config.folder = document.getElementById('cfg-folder').value.trim();
  persist();
  closeModal('m-config');
  if(S.config.user && S.config.repo) syncGitHub();
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1916;color:#fff;font-size:.82rem;padding:9px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .2s;white-space:nowrap;font-family:DM Sans,sans-serif';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(t._to);
  t._to=setTimeout(()=>{ t.style.opacity='0'; }, 3000);
}

// ══════════════════════════════════════════
// COLORS
// ══════════════════════════════════════════
const COLORS=['#2d3561','#1e5245','#7a2038','#5a3e1b','#1a3a5c','#4a4a4a'];
function bookColor(id){ return COLORS[S.books.findIndex(b=>b.id===id)%COLORS.length]; }

// ══════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════
function pct(book){
  if(!book.chapters||!book.chapters.length) return 0;
  return Math.round(book.chapters.filter(c=>c.read).length/(book.totalChapters||book.chapters.length)*100);
}

// ══════════════════════════════════════════
// HOME
// ══════════════════════════════════════════
function setTab(t){
  S.tab=t;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['en-cours','termine','all'][i]===t);
  });
  renderHome();
}

function renderHome(){
  const el=document.getElementById('home-list');
  let books=S.books;
  if(S.tab==='en-cours') books=books.filter(b=>b.status==='en-cours');
  else if(S.tab==='termine') books=books.filter(b=>b.status==='termine');

  const {user,repo}=S.config;
  const configOk = user&&repo;
  const lastSyncStr = S.lastSync
    ? 'Dernière sync : '+new Date(S.lastSync).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
    : 'Jamais synchronisé';

  let html='';

  // Setup banner si pas configuré
  if(!configOk){
    html+=`<div class="setup-banner">
      <h4>Connecter GitHub</h4>
      <p>Renseigne ton dépôt GitHub pour charger automatiquement tes livres JSON.</p>
      <input id="quick-user" placeholder="Nom d'utilisateur GitHub" oninput="document.getElementById('cfg-user').value=this.value"/>
      <input id="quick-repo" placeholder="Nom du dépôt" style="margin-top:6px" oninput="document.getElementById('cfg-repo').value=this.value"/>
      <button class="setup-save" onclick="saveConfig()">Connecter et synchroniser</button>
    </div>`;
  } else {
    html+=`<div class="sync-bar">
      <span>${lastSyncStr}</span>
      <button class="sync-btn" onclick="syncGitHub()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 8A6 6 0 1 1 8 2M8 2l3 3M8 2L5 5"/></svg>
        Synchroniser
      </button>
    </div>`;
  }

  if(books.length===0){
    html+=`<div class="empty"><p>${S.books.length===0
      ? 'Aucun livre.<br>Synchronise depuis GitHub<br>ou ajoute-en un manuellement.'
      : 'Aucun livre dans cet onglet.'
    }</p></div>`;
  } else {
    html+='<div class="books-list">';
    books.forEach(book=>{
      const p=pct(book);
      const sLabel=book.status==='en-cours'?'En cours':book.status==='termine'?'Terminé':'À lire';
      const sCls='status-'+book.status;
      const srcBadge=book.source==='github'
        ?'<span class="source-badge source-github">GitHub</span>'
        :'<span class="source-badge source-local">Local</span>';
      html+=`<div class="book-row" onclick="openBook('${book.id}')">
        <div class="book-color-tab" style="background:${bookColor(book.id)}"></div>
        <div class="book-row-info">
          <div class="book-row-title">${book.title}</div>
          <div class="book-row-author">${book.author}${book.year?' · '+book.year:''}</div>
          <div class="book-row-progress">
            <div class="progress-track"><div class="progress-fill" style="width:${p}%"></div></div>
            <span class="progress-pct">${p}%</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          <span class="status-tag ${sCls}">${sLabel}</span>
          ${srcBadge}
        </div>
      </div>`;
    });
    html+='</div>';
  }

  html+=`<button class="add-row" onclick="openModal('m-book')" style="margin-top:10px">+ Ajouter manuellement</button>`;
  el.innerHTML=html;
}

// ══════════════════════════════════════════
// BOOK DETAIL
// ══════════════════════════════════════════
function openBook(id){
  S.bookId=id;
  const book=S.books.find(b=>b.id===id);
  if(!book) return;
  // Masquer "+ Chapitre" pour les livres GitHub (lecture seule sur le contenu)
  document.getElementById('detail-add-btn').style.display = book.source==='github' ? 'none' : '';
  renderDetail(book);
  showView('detail');
}

function renderDetail(book){
  const p=pct(book);
  const readCount=book.chapters.filter(c=>c.read).length;
  const total=book.totalChapters||book.chapters.length;

  let html=`<div class="detail-hero">
    <div class="detail-hero-title">${book.title}</div>
    <div class="detail-hero-author">${book.author}${book.year?' · '+book.year:''}</div>
    <div class="detail-progress-row">
      <div class="detail-progress-track"><div class="detail-progress-fill" style="width:${p}%"></div></div>
      <span class="detail-progress-label">${readCount} / ${total} chapitres</span>
    </div>
  </div>`;

  // EN-TÊTE
  const hasHeader=book.header&&book.header.trim();
  const canEdit = book.source!=='github';
  html+=`<div class="section-block">
    <div class="section-block-header" onclick="toggleBlock(this)">
      <div class="section-block-label">
        <div class="section-icon">📖</div>
        <div>
          <div class="section-block-title">En-tête</div>
          <div class="section-block-subtitle">${hasHeader?'Contexte, structure, ton':'Non renseigné'}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${canEdit?`<button class="block-edit-btn" onclick="event.stopPropagation();openEditHeader('${book.id}')">Modifier</button>`:''}
        <span class="section-chevron">›</span>
      </div>
    </div>
    <div class="section-block-body">
      ${hasHeader ? formatContent(book.header) : `<p style="color:var(--text-3);font-style:italic;font-size:.875rem;padding:4px 0">${canEdit?"Aucun en-tête. Utilise \"Modifier\" pour y coller l'en-tête généré par Claude.":'En-tête non disponible.'}</p>`}
    </div>
  </div>`;

  // PERSONNAGES
  const chars=book.characters||[];
  const byRole=r=>chars.filter(c=>c.role===r);
  html+=`<div class="section-block">
    <div class="section-block-header" onclick="toggleBlock(this)">
      <div class="section-block-label">
        <div class="section-icon">👤</div>
        <div>
          <div class="section-block-title">Personnages</div>
          <div class="section-block-subtitle">${chars.length} fiche${chars.length>1?'s':''}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${canEdit?`<button class="block-edit-btn" onclick="event.stopPropagation();openAddChar('${book.id}')">+ Fiche</button>`:''}
        <span class="section-chevron">›</span>
      </div>
    </div>
    <div class="section-block-body">`;

  if(!chars.length){
    html+=`<p style="color:var(--text-3);font-style:italic;font-size:.875rem;padding:4px 0">${canEdit?'Aucune fiche. Utilise "+ Fiche" pour ajouter les personnages.':'Aucune fiche disponible.'}</p>`;
  } else {
    ['Principal','Secondaire','Tertiaire'].forEach(role=>{
      const group=byRole(role);
      if(!group.length) return;
      html+=`<div style="font-size:.7rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);padding:10px 0 4px">${role}s</div>`;
      group.forEach(c=>{
        html+=`<div class="char-card">
          <div class="char-name">${c.name}</div>
          <div class="char-meta">${c.meta||''}</div>
          <span class="char-tag">${c.role}</span>
          <div class="char-desc">${c.desc||''}</div>
        </div>`;
      });
    });
  }
  html+=`</div></div>`;

  // CHAPITRES
  const sortedChs=[...(book.chapters||[])].sort((a,b)=>a.num-b.num);
  const currentCh=sortedChs.find(c=>!c.read);
  html+=`<div class="section-block">
    <div class="section-block-header" onclick="toggleBlock(this)">
      <div class="section-block-label">
        <div class="section-icon">📄</div>
        <div>
          <div class="section-block-title">Chapitres</div>
          <div class="section-block-subtitle">${sortedChs.length} enregistré${sortedChs.length>1?'s':''}</div>
        </div>
      </div>
      <span class="section-chevron open">›</span>
    </div>
    <div class="section-block-body open">`;

  if(!sortedChs.length){
    html+=`<p style="color:var(--text-3);font-style:italic;font-size:.875rem;padding:4px 0">Aucun chapitre disponible.</p>`;
  } else {
    sortedChs.forEach((ch,idx)=>{
      const isCurrent=currentCh&&ch.num===currentCh.num;
      html+=`<div class="chapter-row${ch.read?' read':''}" onclick="openChapter('${book.id}',${idx})">
        <span class="ch-num">${ch.num}</span>
        <span class="ch-title">${ch.title||'Chapitre '+ch.num}</span>
        ${isCurrent?'<span class="ch-current"></span>':''}
        ${ch.read?'<span class="ch-check">✓</span>':''}
      </div>`;
    });
  }
  html+=`</div></div>`;

  document.getElementById('detail-body').innerHTML=html;
}

function toggleBlock(header){
  const chevron=header.querySelector('.section-chevron');
  const body=header.nextElementSibling;
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  chevron.classList.toggle('open',!isOpen);
}

// ══════════════════════════════════════════
// READER
// ══════════════════════════════════════════
function openChapter(bookId,idx){
  S.bookId=bookId; S.chIdx=idx;
  const book=S.books.find(b=>b.id===bookId);
  const chs=[...(book.chapters||[])].sort((a,b)=>a.num-b.num);
  const ch=chs[idx];
  if(!ch) return;

  document.getElementById('reader-back-label').textContent=book.title;
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx>=chs.length-1;
  const bm=document.getElementById('btn-mark');
  bm.textContent=ch.read?'Marquer non lu':'Marquer lu';
  bm.classList.toggle('done',ch.read);

  const body=document.getElementById('reader-body');
  let html=`<div style="margin-bottom:6px;font-size:.78rem;color:var(--text-3)">Chapitre ${ch.num}</div>`;
  html+=`<div style="font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text);line-height:1.25;margin-bottom:20px">${ch.title||'Chapitre '+ch.num}</div>`;
  html+=ch.content ? formatContent(ch.content) : `<div style="color:var(--text-3);font-style:italic;font-size:.9rem">Aucun guide pour ce chapitre.</div>`;
  body.innerHTML=html;
  body.scrollTop=0;
  showView('reader');
}

function formatContent(text){
  return text.split('\n\n').map(p=>{
    if(/^#{1,2} /.test(p)) return `<div class="reader-section-title">${p.replace(/^#+\s/,'')}</div>`;
    if(p.startsWith('> ')) return `<div class="reader-quote"><p>${p.slice(2)}</p></div>`;
    if(p.startsWith('?')) return `<div class="reader-reflection"><p>${p}</p></div>`;
    return `<p class="reader-para">${p.replace(/\n/g,'<br>')}</p>`;
  }).join('');
}

function navChapter(dir){
  const book=S.books.find(b=>b.id===S.bookId);
  const chs=[...(book.chapters||[])].sort((a,b)=>a.num-b.num);
  const ni=S.chIdx+dir;
  if(ni<0||ni>=chs.length) return;
  openChapter(S.bookId,ni);
}

function toggleRead(){
  const book=S.books.find(b=>b.id===S.bookId);
  const chs=[...(book.chapters||[])].sort((a,b)=>a.num-b.num);
  const ch=chs[S.chIdx];
  const orig=book.chapters.find(c=>c.num===ch.num);
  orig.read=!orig.read;
  if(book.chapters.every(c=>c.read)) book.status='termine';
  else if(book.status==='termine') book.status='en-cours';
  persist();
  openChapter(S.bookId,S.chIdx);
}

// ══════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeIfOverlay(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }

function openAddChapter(){
  document.getElementById('c-num').value='';
  document.getElementById('c-title').value='';
  document.getElementById('c-content').value='';
  openModal('m-chapter');
}

function saveBook(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('Titre requis');return;}
  const book={
    id:Date.now()+'', title,
    author:document.getElementById('f-author').value.trim(),
    year:document.getElementById('f-year').value,
    totalChapters:parseInt(document.getElementById('f-total').value)||0,
    status:document.getElementById('f-status').value,
    chapters:[], characters:[], header:'', source:'local', createdAt:Date.now()
  };
  S.books.push(book); persist(); closeModal('m-book'); renderHome();
  ['f-title','f-author','f-year','f-total'].forEach(id=>document.getElementById(id).value='');
}

function saveChapter(){
  const num=parseInt(document.getElementById('c-num').value);
  if(!num){alert('Numéro requis');return;}
  const book=S.books.find(b=>b.id===S.bookId);
  const ch={num,title:document.getElementById('c-title').value.trim(),content:document.getElementById('c-content').value.trim(),read:false};
  const ei=book.chapters.findIndex(c=>c.num===num);
  if(ei>=0) book.chapters[ei]=ch; else book.chapters.push(ch);
  persist(); closeModal('m-chapter'); renderDetail(book);
}

function openEditHeader(bookId){
  S.bookId=bookId;
  document.getElementById('h-content').value=S.books.find(b=>b.id===bookId)?.header||'';
  openModal('m-header');
}

function saveHeader(){
  const book=S.books.find(b=>b.id===S.bookId);
  book.header=document.getElementById('h-content').value.trim();
  persist(); closeModal('m-header'); renderDetail(book);
}

function openAddChar(bookId){
  S.bookId=bookId;
  ['ch-name','ch-meta','ch-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ch-role').value='Principal';
  openModal('m-char');
}

function saveChar(){
  const name=document.getElementById('ch-name').value.trim();
  if(!name){alert('Nom requis');return;}
  const book=S.books.find(b=>b.id===S.bookId);
  if(!book.characters) book.characters=[];
  book.characters.push({name,role:document.getElementById('ch-role').value,meta:document.getElementById('ch-meta').value.trim(),desc:document.getElementById('ch-desc').value.trim()});
  persist(); closeModal('m-char'); renderDetail(book);
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function showView(name){
  ['v-home','v-detail','v-reader'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.display='none';
  });
  const el=document.getElementById('v-'+name);
  el.style.display='flex';
  el.style.flexDirection='column';
}

function goHome(){ showView('home'); renderHome(); }
function goDetail(){
  const book=S.books.find(b=>b.id===S.bookId);
  if(book){ renderDetail(book); showView('detail'); } else goHome();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
hydrate();
showView('home');
renderHome();
</script>
